<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#c5e1a5"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Broken chain (freedom from slavery) -->
  <!-- Left chain link -->
  <ellipse cx="78" cy="90" rx="10" ry="6" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" transform="rotate(-20,78,90)"/>
  <!-- Chain break gap -->
  <line x1="86" y1="88" x2="92" y2="92" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Right chain link -->
  <ellipse cx="122" cy="90" rx="10" ry="6" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" transform="rotate(20,122,90)"/>
  <!-- Lamp of knowledge -->
  <ellipse cx="100" cy="58" rx="10" ry="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="100" y1="51" x2="100" y2="44" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <ellipse cx="100" cy="44" rx="5" ry="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Initials -->
  <text x="100" y="100" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="700" fill="rgba(255,255,255,0.9)" dominant-baseline="middle">EP</text>
  <line x1="52" y1="132" x2="148" y2="132" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="149" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2">EPICTETUS</text>
  <text x="100" y="166" text-anchor="middle" font-family="Georgia, serif"
        font-size="9.5" fill="rgba(255,255,255,0.55)" font-style="italic">Greek Stoic · 50–135 AD</text>
</svg>
