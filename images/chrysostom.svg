<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe57f"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,236,150,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,200,0,0)"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Halo glow -->
  <circle cx="100" cy="72" r="46" fill="url(#halo)"/>
  <!-- Halo ring (dashed, gold) -->
  <circle cx="100" cy="72" r="42" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Cross in halo -->
  <line x1="100" y1="52" x2="100" y2="92" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="82" y1="66" x2="118" y2="66" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Initials -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="3">JC</text>
  <!-- Divider line -->
  <line x1="55" y1="118" x2="145" y2="118" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- Name -->
  <text x="100" y="136" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="11" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="1">ST. JOHN</text>
  <text x="100" y="151" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="10" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="1">CHRYSOSTOM</text>
  <!-- Origin -->
  <text x="100" y="168" text-anchor="middle" font-family="Georgia, serif"
        font-size="9" fill="rgba(255,255,255,0.6)" font-style="italic">Golden-Mouthed · 347–407 AD</text>
</svg>
