<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,250,180,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,200,0,0)"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Outer glory ring -->
  <circle cx="100" cy="72" r="50" fill="url(#halo)"/>
  <!-- Halo ring (solid for Christ) -->
  <circle cx="100" cy="72" r="44" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <!-- Chi-Rho: vertical bar -->
  <line x1="100" y1="50" x2="100" y2="94" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <!-- Chi-Rho: horizontal bar -->
  <line x1="80" y1="63" x2="120" y2="63" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <!-- Chi-Rho: small top cross arm -->
  <line x1="95" y1="51" x2="105" y2="51" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- IC XC letters -->
  <text x="82" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.75)">IC</text>
  <text x="118" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.75)">XC</text>
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="2">☩</text>
  <line x1="50" y1="118" x2="150" y2="118" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="100" y="136" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="12" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="2">JESUS CHRIST</text>
  <text x="100" y="152" text-anchor="middle" font-family="Georgia, serif"
        font-size="10" fill="rgba(255,255,255,0.75)" letter-spacing="1">The Word of God</text>
  <text x="100" y="168" text-anchor="middle" font-family="Georgia, serif"
        font-size="9" fill="rgba(255,255,255,0.55)" font-style="italic">The Light of the World</text>
</svg>
